<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="300" viewBox="0 0 1100 300" role="img" aria-label="Pep Suppliers — All-in-one peptide source">
  <defs>
    <linearGradient id="wordmarkGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0A56D6"/>
      <stop offset="22%" stop-color="#126CFF"/>
      <stop offset="42%" stop-color="#0FB2D7"/>
      <stop offset="58%" stop-color="#14B887"/>
      <stop offset="74%" stop-color="#F2C84B"/>
      <stop offset="88%" stop-color="#F5A24C"/>
      <stop offset="100%" stop-color="#F05BA8"/>
    </linearGradient>
    <linearGradient id="liquidGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#126CFF"/>
      <stop offset="55%" stop-color="#19B5E8"/>
      <stop offset="100%" stop-color="#14B887"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#12304A" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1100" height="300" fill="none"/>

  <!-- syringe brand mark -->
  <g transform="translate(40 36)" filter="url(#softShadow)">
    <path d="M16 156 C7 98 39 37 122 15" fill="none" stroke="#56A8FF" stroke-width="8" stroke-linecap="round" opacity="0.72"/>
    <g transform="translate(78 15) rotate(-18)">
      <rect x="-14" y="14" width="46" height="152" rx="18" fill="#FFFFFF" stroke="#0B1740" stroke-width="7"/>
      <rect x="-5" y="72" width="28" height="70" rx="10" fill="url(#liquidGradient)" opacity="0.95"/>
      <path d="M9 166 L9 222" stroke="#0B1740" stroke-width="7" stroke-linecap="round"/>
      <path d="M-14 222 L32 222" stroke="#0B1740" stroke-width="7" stroke-linecap="round"/>
      <path d="M9 222 L9 242" stroke="#0B1740" stroke-width="5" stroke-linecap="round"/>
      <path d="M-26 30 L44 30" stroke="#0B1740" stroke-width="7" stroke-linecap="round"/>
      <path d="M3 4 L15 4" stroke="#0B1740" stroke-width="7" stroke-linecap="round"/>
      <path d="M-1 52 L20 52" stroke="#DDEAF5" stroke-width="4" stroke-linecap="round"/>
      <path d="M-1 92 L20 92" stroke="#DDEAF5" stroke-width="4" stroke-linecap="round"/>
      <path d="M-1 122 L20 122" stroke="#DDEAF5" stroke-width="4" stroke-linecap="round"/>
    </g>
  </g>

  <!-- wordmark -->
  <g transform="translate(205 52)">
    <text x="0" y="96"
      font-family="Inter, Avenir Next, Montserrat, Arial Black, Arial, sans-serif"
      font-size="92"
      font-weight="900"
      font-style="italic"
      letter-spacing="-6"
      fill="url(#wordmarkGradient)">Pep Suppliers</text>

    <!-- accent bars -->
    <rect x="4" y="126" width="168" height="13" rx="7" fill="#0A56D6"/>
    <rect x="192" y="126" width="168" height="13" rx="7" fill="#14B887"/>
    <rect x="380" y="126" width="168" height="13" rx="7" fill="#F05BA8"/>

    <text x="2" y="186"
      font-family="Inter, Avenir Next, Montserrat, Arial, sans-serif"
      font-size="28"
      font-weight="900"
      letter-spacing="12"
      fill="#11346A">ALL-IN-ONE PEPTIDE SOURCE</text>
  </g>
</svg>