<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Pep Suppliers Logo Preview</title>
  <style>
    body {
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:linear-gradient(135deg,#F5FAFF,#FFFDF8);
      font-family:system-ui,sans-serif;
    }
    .card {
      width:min(1100px, calc(100% - 40px));
      padding:36px;
      border-radius:32px;
      background:white;
      box-shadow:0 24px 70px rgba(18,48,74,.14);
      border:1px solid #DDEAF5;
    }
    img { width:100%; height:auto; display:block; }
  </style>
</head>
<body>
  <div class="card">
    <img src="pep-suppliers-logo-gpt-v9.svg" alt="Pep Suppliers Logo">
  </div>
</body>
</html>
